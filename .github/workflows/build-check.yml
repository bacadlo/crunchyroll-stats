name: Build Check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crunchyroll-stats-api/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crunchyroll-stats-api/Cargo.lock') }}
      - name: Clippy (compile + lint)
        working-directory: crunchyroll-stats-api
        run: cargo clippy --release -- -D warnings

  nextjs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: crunchyroll-stats-app/package-lock.json
      - name: Install dependencies
        working-directory: crunchyroll-stats-app
        run: npm ci
      - name: Type check
        working-directory: crunchyroll-stats-app
        run: npx tsc --noEmit
      - name: Lint
        working-directory: crunchyroll-stats-app
        run: npm run lint
      - name: Build
        working-directory: crunchyroll-stats-app
        run: npm run build
